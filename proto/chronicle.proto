syntax = "proto3";
package chronicle;

service Chronicle {
  rpc Produce(ProduceRequest) returns (ProduceResponse);
  rpc Fetch(FetchRequest) returns (FetchResponse);
  rpc CreateTopic(CreateTopicRequest) returns (CreateTopicResponse);
  rpc DeleteTopic(DeleteTopicRequest) returns (DeleteTopicResponse);
  rpc GetMetadata(GetMetadataRequest) returns (GetMetadataResponse);
  rpc ReplicateFetch(ReplicateFetchRequest) returns (ReplicateFetchResponse);
  rpc CreateReplica(CreateReplicaRequest) returns (CreateReplicaResponse);
  rpc JoinGroup(JoinGroupRequest) returns (JoinGroupResponse);
  rpc LeaveGroup(LeaveGroupRequest) returns (LeaveGroupResponse);
  rpc ConsumerHeartbeat(ConsumerHeartbeatRequest) returns (ConsumerHeartbeatResponse);
  rpc CommitOffset(CommitOffsetRequest) returns (CommitOffsetResponse);
  rpc FetchOffsets(FetchOffsetsRequest) returns (FetchOffsetsResponse);
  rpc ListGroups(ListGroupsRequest) returns (ListGroupsResponse);
  rpc DescribeGroup(DescribeGroupRequest) returns (DescribeGroupResponse);
  rpc OffsetForTimestamp(OffsetForTimestampRequest) returns (OffsetForTimestampResponse);
  rpc InitProducerId(InitProducerIdRequest) returns (InitProducerIdResponse);
  rpc BeginTransaction(BeginTransactionRequest) returns (BeginTransactionResponse);
  rpc AddPartitionsToTxn(AddPartitionsToTxnRequest) returns (AddPartitionsToTxnResponse);
  rpc AddOffsetsToTxn(AddOffsetsToTxnRequest) returns (AddOffsetsToTxnResponse);
  rpc TxnOffsetCommit(TxnOffsetCommitRequest) returns (TxnOffsetCommitResponse);
  rpc EndTransaction(EndTransactionRequest) returns (EndTransactionResponse);
  rpc WriteTxnMarkers(WriteTxnMarkersRequest) returns (WriteTxnMarkersResponse);
  rpc CreateStreamJob(CreateStreamJobRequest) returns (CreateStreamJobResponse);
  rpc DeleteStreamJob(DeleteStreamJobRequest) returns (DeleteStreamJobResponse);
  rpc ListStreamJobs(ListStreamJobsRequest) returns (ListStreamJobsResponse);
  rpc DescribeStreamJob(DescribeStreamJobRequest) returns (DescribeStreamJobResponse);
  rpc UpdateStreamJobStatus(UpdateStreamJobStatusRequest) returns (UpdateStreamJobStatusResponse);
}

service ControllerService {
  rpc RaftAppendEntries(RaftPayload) returns (RaftPayload);
  rpc RaftVote(RaftPayload) returns (RaftPayload);
  rpc RaftInstallSnapshot(RaftPayload) returns (RaftPayload);
  rpc RegisterBroker(RegisterBrokerRequest) returns (RegisterBrokerResponse);
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
  rpc ProposeCommand(ProposeCommandRequest) returns (ProposeCommandResponse);
  rpc FetchClusterState(FetchClusterStateRequest) returns (FetchClusterStateResponse);
}

enum Acks {
  ACKS_LEADER = 0;
  ACKS_NONE = 1;
  ACKS_ALL = 2;
}

message ProduceRequest {
  bytes key = 1;
  bytes value = 2;
  string topic = 3;
  optional uint32 partition = 4;
  Acks acks = 5;
  uint64 producer_id = 6;
  uint32 producer_epoch = 7;
  uint32 first_sequence = 8;
  repeated RecordHeader headers = 9;
  bool is_transactional = 10;
}

message ProduceResponse {
  uint64 offset = 1;
  Error error = 2;
  uint32 partition = 3;
  optional uint32 leader_broker_id = 4;
}

message FetchRequest {
  uint64 offset = 1;
  uint32 max_records = 2;
  string topic = 3;
  uint32 partition = 4;
  IsolationLevel isolation_level = 5;
}

message FetchResponse {
  repeated Record records = 1;
  uint64 high_watermark = 2;
  Error error = 3;
  optional uint32 leader_broker_id = 4;
}

message RecordHeader {
  string key = 1;
  bytes value = 2;
}

message Record {
  uint64 offset = 1;
  uint64 timestamp_ms = 2;
  bytes key = 3;
  bytes value = 4;
  repeated RecordHeader headers = 5;
  uint64 producer_id = 6;
  uint32 producer_epoch = 7;
  uint32 sequence_number = 8;
  bool is_transactional = 9;
  bool is_control = 10;
}

message CreateTopicRequest {
  string name = 1;
  uint32 partition_count = 2;
  uint32 replication_factor = 3;
}

message CreateTopicResponse {
  Error error = 1;
}

message DeleteTopicRequest {
  string name = 1;
}

message DeleteTopicResponse {
  Error error = 1;
}

message GetMetadataRequest {
  repeated string topics = 1;
}

message GetMetadataResponse {
  repeated TopicInfo topics = 1;
  Error error = 2;
}

message TopicInfo {
  string name = 1;
  uint32 partition_count = 2;
  uint32 replication_factor = 3;
  repeated PartitionInfo partitions = 4;
}

message PartitionInfo {
  uint32 partition_id = 1;
  uint32 leader_broker_id = 2;
  repeated uint32 replica_broker_ids = 3;
  repeated uint32 isr_broker_ids = 4;
  uint64 high_watermark = 5;
  uint64 log_end_offset = 6;
  uint64 leader_epoch = 7;
}

message ReplicateFetchRequest {
  uint32 broker_id = 1;
  string topic = 2;
  uint32 partition = 3;
  uint64 fetch_offset = 4;
  uint64 leader_epoch = 5;
}

message ReplicateFetchResponse {
  repeated Record records = 1;
  uint64 leader_leo = 2;
  uint64 high_watermark = 3;
  Error error = 4;
  uint64 leader_epoch = 5;
}

message CreateReplicaRequest {
  string topic = 1;
  uint32 partition_count = 2;
  uint32 replication_factor = 3;
  repeated uint32 local_partitions = 4;
  repeated ProtoPartitionAssignment assignments = 5;
}

message ProtoPartitionAssignment {
  uint32 partition_id = 1;
  repeated uint32 replica_ids = 2;
}

message CreateReplicaResponse {
  Error error = 1;
}

message RaftPayload {
  bytes data = 1;
}

message RegisterBrokerRequest {
  uint32 broker_id = 1;
  string addr = 2;
}

message RegisterBrokerResponse {
  bool success = 1;
  Error error = 2;
}

message HeartbeatRequest {
  uint32 broker_id = 1;
}

message HeartbeatResponse {
  bool success = 1;
  Error error = 2;
}

message ProposeCommandRequest {
  bytes command = 1;
}

message ProposeCommandResponse {
  bytes response = 1;
  Error error = 2;
}

message FetchClusterStateRequest {}

message FetchClusterStateResponse {
  bytes state = 1;
  Error error = 2;
}

message Error {
  ErrorCode code = 1;
  string message = 2;
}

enum ErrorCode {
  NONE = 0;
  OFFSET_OUT_OF_RANGE = 1;
  INTERNAL_ERROR = 2;
  UNKNOWN_TOPIC = 3;
  UNKNOWN_PARTITION = 4;
  TOPIC_ALREADY_EXISTS = 5;
  INVALID_REQUEST = 6;
  NOT_LEADER_FOR_PARTITION = 7;
  CONSUMER_GROUP_NOT_FOUND = 8;
  MEMBER_NOT_FOUND = 9;
  GENERATION_MISMATCH = 10;
  DUPLICATE_SEQUENCE = 11;
  OUT_OF_ORDER_SEQUENCE = 12;
  INVALID_PRODUCER_EPOCH = 13;
  PRODUCER_FENCED = 14;
  TRANSACTION_NOT_FOUND = 15;
  INVALID_TXN_STATE = 16;
  TRANSACTION_COORDINATOR_ERROR = 17;
}

enum IsolationLevel {
  READ_UNCOMMITTED = 0;
  READ_COMMITTED = 1;
}

message TopicPartition {
  string topic = 1;
  uint32 partition = 2;
}

message TopicPartitionOffset {
  string topic = 1;
  uint32 partition = 2;
  uint64 offset = 3;
}

message JoinGroupRequest {
  string group_id = 1;
  string member_id = 2;
  repeated string topics = 3;
  uint32 session_timeout_ms = 4;
}

message JoinGroupResponse {
  uint64 generation_id = 1;
  string member_id = 2;
  repeated TopicPartition assignments = 3;
  Error error = 4;
}

message LeaveGroupRequest {
  string group_id = 1;
  string member_id = 2;
}

message LeaveGroupResponse {
  Error error = 1;
}

message ConsumerHeartbeatRequest {
  string group_id = 1;
  string member_id = 2;
  uint64 generation_id = 3;
}

message ConsumerHeartbeatResponse {
  bool rebalance_required = 1;
  Error error = 2;
}

message CommitOffsetRequest {
  string group_id = 1;
  repeated TopicPartitionOffset offsets = 2;
}

message CommitOffsetResponse {
  Error error = 1;
}

message FetchOffsetsRequest {
  string group_id = 1;
  repeated TopicPartition partitions = 2;
}

message FetchOffsetsResponse {
  repeated TopicPartitionOffset offsets = 1;
  Error error = 2;
}

message ListGroupsRequest {}

message ListGroupsResponse {
  repeated string group_ids = 1;
  Error error = 2;
}

message DescribeGroupRequest {
  string group_id = 1;
}

message DescribeGroupResponse {
  string group_id = 1;
  uint64 generation_id = 2;
  repeated GroupMemberInfo members = 3;
  repeated TopicPartitionOffset committed_offsets = 4;
  Error error = 5;
}

message GroupMemberInfo {
  string member_id = 1;
  repeated string subscriptions = 2;
  repeated TopicPartition assignments = 3;
}

message OffsetForTimestampRequest {
  string topic = 1;
  uint32 partition = 2;
  uint64 timestamp_ms = 3;
}

message OffsetForTimestampResponse {
  uint64 offset = 1;
  bool found = 2;
  Error error = 3;
}

message InitProducerIdRequest {
  string transactional_id = 1;
}

message InitProducerIdResponse {
  uint64 producer_id = 1;
  uint32 producer_epoch = 2;
  Error error = 3;
}

message BeginTransactionRequest {
  uint64 producer_id = 1;
  uint32 producer_epoch = 2;
}

message BeginTransactionResponse {
  Error error = 1;
}

message AddPartitionsToTxnRequest {
  uint64 producer_id = 1;
  uint32 producer_epoch = 2;
  repeated TopicPartition partitions = 3;
}

message AddPartitionsToTxnResponse {
  Error error = 1;
}

message AddOffsetsToTxnRequest {
  uint64 producer_id = 1;
  uint32 producer_epoch = 2;
  string group_id = 3;
}

message AddOffsetsToTxnResponse {
  Error error = 1;
}

message TxnOffsetCommitRequest {
  uint64 producer_id = 1;
  uint32 producer_epoch = 2;
  string group_id = 3;
  repeated TopicPartitionOffset offsets = 4;
}

message TxnOffsetCommitResponse {
  Error error = 1;
}

message EndTransactionRequest {
  uint64 producer_id = 1;
  uint32 producer_epoch = 2;
  bool commit = 3;
}

message EndTransactionResponse {
  repeated TopicPartition partitions = 1;
  Error error = 2;
}

message WriteTxnMarkersRequest {
  uint64 producer_id = 1;
  uint32 producer_epoch = 2;
  bool commit = 3;
  repeated TopicPartition partitions = 4;
}

message WriteTxnMarkersResponse {
  Error error = 1;
}

message CreateStreamJobRequest {
  string job_name = 1;
  string input_topic = 2;
  uint32 input_partition = 3;
  string output_topic = 4;
  uint32 output_partition = 5;
  repeated string operator_chain = 6;
}

message CreateStreamJobResponse {
  Error error = 1;
}

message DeleteStreamJobRequest {
  string job_name = 1;
}

message DeleteStreamJobResponse {
  Error error = 1;
}

message ListStreamJobsRequest {}

message ListStreamJobsResponse {
  repeated StreamJobInfo jobs = 1;
  Error error = 2;
}

message DescribeStreamJobRequest {
  string job_name = 1;
}

message DescribeStreamJobResponse {
  StreamJobInfo job = 1;
  Error error = 2;
}

message UpdateStreamJobStatusRequest {
  string job_name = 1;
  string status = 2;
}

message UpdateStreamJobStatusResponse {
  Error error = 1;
}

message StreamJobInfo {
  string job_name = 1;
  string input_topic = 2;
  uint32 input_partition = 3;
  string output_topic = 4;
  uint32 output_partition = 5;
  repeated string operator_chain = 6;
  string status = 7;
}
